<!doctype html>

        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .container {
        background: white;
        border-radius: 12px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 500px;
        width: 100%;
        padding: 40px;
      }
      h1 {
        color: #333;
        margin-bottom: 10px;
        font-size: 1.8rem;
      }
      p {
        color: #666;
        line-height: 1.6;
        margin-bottom: 20px;
      }
      .status {
        padding: 15px;
        border-radius: 8px;
        margin: 20px 0;
        font-weight: 500;
      }
      .status.waiting {
        background: #e3f2fd;
        color: #1976d2;
        border-left: 4px solid #1976d2;
      }
      .status.success {
        background: #e8f5e9;
        color: #388e3c;
        border-left: 4px solid #388e3c;
      }
      .status.error {
        background: #ffebee;
        color: #d32f2f;
        border-left: 4px solid #d32f2f;
      }
      button {
        width: 100%;
        padding: 12px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
      }
      button:hover:not(:disabled) {
        background: #764ba2;
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .steps {
        margin-top: 30px;
        padding-top: 30px;
        border-top: 1px solid #eee;
      }
      .step {
        display: none;
        margin-bottom: 15px;
        padding-bottom: 15px;
        border-bottom: 1px solid #eee;
      }
      .step.active {
        display: block;
      }
      .step-icon {
        display: inline-block;
        width: 32px;
        height: 32px;
        line-height: 32px;
        text-align: center;
        background: #667eea;
        color: white;
        border-radius: 50%;
        font-weight: bold;
        margin-right: 10px;
        vertical-align: middle;
      }
      .step-title {
        font-weight: 600;
        color: #333;
        margin: 10px 0 5px 0;
      }
      .step-desc {
        color: #666;
        font-size: 0.9rem;
        margin-left: 42px;
      }
      code {
        background: #f5f5f5;
        padding: 2px 6px;
        border-radius: 4px;
        font-family: "Courier New", monospace;
        color: #d32f2f;
      }
      .warning {
        background: #fff3cd;
        border: 1px solid #ffc107;
        color: #856404;
        padding: 12px;
        border-radius: 6px;
        margin: 20px 0;
        font-size: 0.9rem;
      }
    </style>

      async function setSecret(token, name, value) {
        try {
          const response = await fetch(`${SUPABASE_URL}/rest/v1/secrets`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
              apikey: token,
            },
            body: JSON.stringify({ name, value }),
          });

          return response.ok;
        } catch (e) {
          console.error(`Erro ao configurar ${name}:`, e);
          return false;
        }
      }

      function getTokenFromSession() {
        // Tenta vários lugares onde o Supabase pode estar armazenando o token
        const keys = Object.keys(localStorage).concat(
          Object.keys(sessionStorage),
        );
        for (const key of keys) {
          if (key.includes("supabase") || key.includes("auth")) {
            const value =
              localStorage.getItem(key) || sessionStorage.getItem(key);
            if (value && typeof value === "string" && value.length > 100) {
              return value;
            }
          }
        }
        return null;
      }
